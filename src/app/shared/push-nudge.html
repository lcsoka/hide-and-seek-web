@if (visible()) {
  @if (compact()) {
    <div *transloco="let t" class="jl-pop pointer-events-auto flex items-center gap-2 rounded-full bg-rose-600/95 py-1 pl-3 pr-1 text-xs font-medium text-white shadow-lg backdrop-blur">
      <span aria-hidden="true">🔔</span>
      <span class="hidden sm:inline">{{ t('push.nudgeShort') }}</span>
      <button (click)="enable()" [disabled]="push.busy()"
              class="rounded-full bg-white/20 px-2.5 py-1 font-semibold transition hover:bg-white/30 disabled:opacity-50">
        {{ t('push.nudgeEnable') }}
      </button>
      <button (click)="dismiss()" [attr.aria-label]="t('common.cancel')"
              class="grid h-6 w-6 place-items-center rounded-full text-sm opacity-80 transition hover:bg-white/20 hover:opacity-100">✕</button>
    </div>
  } @else {
  <div *transloco="let t" class="rounded-xl border border-rose-200 bg-rose-50 p-3 dark:border-rose-900/40 dark:bg-rose-950/30">
    <div class="flex items-start gap-3">
      <span class="text-lg leading-none">🔔</span>
      <div class="min-w-0 flex-1">
        <div class="text-sm font-semibold text-rose-900 dark:text-rose-200">{{ t('push.nudgeTitle') }}</div>
        <p class="mt-0.5 text-xs text-rose-800/80 dark:text-rose-300/80">{{ t('push.nudgeBody') }}</p>
        <div class="mt-2 flex gap-2">
          <button (click)="enable()" [disabled]="push.busy()"
                  class="rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-rose-500 disabled:opacity-50">
            {{ t('push.nudgeEnable') }}
          </button>
          <button (click)="dismiss()"
                  class="rounded-lg px-3 py-1.5 text-xs font-medium text-rose-800/70 transition hover:bg-rose-100 dark:text-rose-300/70 dark:hover:bg-rose-900/40">
            {{ t('push.nudgeLater') }}
          </button>
        </div>
      </div>
    </div>
  </div>
  }
}
