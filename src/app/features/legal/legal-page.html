<div class="min-h-[100dvh] bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100">
  <ng-container *transloco="let t">
    <!-- Top bar -->
    <header class="sticky top-0 z-10 border-b border-gray-200/70 bg-gray-50/85 backdrop-blur dark:border-white/10 dark:bg-gray-950/85">
      <div class="mx-auto flex max-w-3xl items-center gap-3 px-5 pb-3 pt-[max(0.75rem,env(safe-area-inset-top))]">
        <a routerLink="/" class="grid h-9 w-9 place-items-center rounded-full text-gray-500 transition hover:bg-gray-900/5 dark:text-gray-400 dark:hover:bg-white/10" [attr.aria-label]="t('common.leave')">←</a>
        <span class="font-display text-base font-bold tracking-tight">{{ t(titleKey()) }}</span>
        <app-lang-toggle class="ml-auto" />
      </div>
    </header>

    <main class="mx-auto max-w-3xl px-5 py-8">
      @if (loading()) {
        <p class="text-sm text-gray-500 dark:text-gray-400">{{ t('common.loading') }}</p>
      } @else if (notFound()) {
        <p class="text-sm text-gray-500 dark:text-gray-400">{{ t('legal.notFound') }}</p>
        <a routerLink="/" class="mt-3 inline-block text-sm font-medium text-rose-600 hover:underline dark:text-rose-400">← {{ t('legal.backHome') }}</a>
      } @else {
        <article class="legal-doc" [innerHTML]="html()"></article>
      }
    </main>
  </ng-container>
</div>
