<div class="mx-auto flex min-h-[100dvh] w-full max-w-sm flex-col justify-center gap-5 p-6" *transloco="let t">
  <h1 class="font-display text-2xl font-bold">{{ t('auth.resetTitle') }}</h1>

  @if (!valid) {
    <p class="rounded-lg bg-red-500/90 p-3 text-sm text-white">{{ t('auth.resetInvalid') }}</p>
    <a routerLink="/" class="text-center text-sm text-rose-600 hover:underline dark:text-rose-400">← {{ t('common.leave') }}</a>
  } @else if (done()) {
    <p class="rounded-lg bg-emerald-50 p-3 text-sm text-emerald-800 dark:bg-emerald-950 dark:text-emerald-200">{{ t('auth.resetDone') }}</p>
    <a routerLink="/" class="w-full rounded-xl bg-rose-600 p-3.5 text-center font-semibold text-white shadow-lg shadow-rose-600/30 hover:bg-rose-500">{{ t('auth.logIn') }}</a>
  } @else {
    <p class="text-sm text-gray-500 dark:text-gray-400">{{ email }}</p>
    @if (error(); as e) {
      <p class="rounded-lg bg-red-500/90 p-2.5 text-sm text-white">{{ e }}</p>
    }
    <form (ngSubmit)="submit()" class="space-y-3">
      <input [(ngModel)]="password" name="password" type="password" [placeholder]="t('auth.newPassword')" autocomplete="new-password" required
             class="w-full rounded-xl border border-gray-300 bg-white p-3 text-gray-900 placeholder-gray-400 focus:border-rose-400 focus:outline-none dark:border-white/15 dark:bg-white/10 dark:text-white dark:placeholder-white/40" />
      <p class="text-xs text-gray-400">{{ t('auth.passwordHint') }}</p>
      <button type="submit" [disabled]="busy() || password.length < 8"
              class="w-full rounded-xl bg-rose-600 p-3.5 font-semibold text-white shadow-lg shadow-rose-600/30 transition hover:bg-rose-500 disabled:cursor-not-allowed disabled:opacity-40">
        {{ busy() ? t('common.loading') : t('auth.resetBtn') }}
      </button>
    </form>
  }
</div>
