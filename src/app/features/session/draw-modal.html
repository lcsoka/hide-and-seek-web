<div class="fixed inset-0 z-[820] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
  <div class="w-full max-w-md rounded-3xl bg-white p-4 shadow-2xl dark:bg-gray-900">
    <h2 class="text-center text-lg font-bold">You drew {{ draw().cards.length }} — keep {{ keep() }}</h2>
    <p class="mb-3 text-center text-sm text-gray-500 dark:text-gray-400">
      @if (keep() < draw().cards.length) { Tap the cards you want to keep. } @else { These go into your hand. }
    </p>

    <div class="grid grid-cols-3 gap-2">
      @for (c of draw().cards; track c.uid; let i = $index) {
        <button (click)="toggle(c.uid)"
                class="card-reveal flex h-40 flex-col justify-between rounded-xl p-2 text-left text-white ring-2 transition"
                [class]="cardClass(c)"
                [class.ring-white]="!isSelected(c.uid)"
                [class.ring-rose-400]="isSelected(c.uid)"
                [class.scale-105]="isSelected(c.uid)"
                [style.animation-delay.ms]="i * 120">
          <div class="min-h-0">
            <div class="text-[10px] font-bold leading-tight">{{ c.name }}</div>
            @if (c.description) { <div class="mt-1 line-clamp-5 text-[8px] leading-snug opacity-80">{{ c.description }}</div> }
          </div>
          <span class="block rounded py-0.5 text-center text-[9px] font-bold uppercase tracking-wide"
                [class]="isSelected(c.uid) ? 'bg-rose-500' : 'bg-white/20'">{{ isSelected(c.uid) ? '✓ keep' : 'tap' }}</span>
        </button>
      }
    </div>

    <button (click)="confirm()" [disabled]="busy() || !canConfirm()"
            class="mt-4 w-full rounded-xl bg-rose-600 p-3 font-semibold text-white hover:bg-rose-700 disabled:opacity-40">
      Keep {{ selected().size }}/{{ keep() }}
    </button>
  </div>
</div>
