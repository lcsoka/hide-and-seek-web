<div class="space-y-4">
  <div>
    <h2 class="text-lg font-bold">Waiting room</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400">Share the code up top to invite players.</p>
  </div>

  <ul class="space-y-1">
    @for (p of state().players; track p.id) {
      <li class="flex items-center gap-2 rounded-lg bg-gray-100 px-3 py-2 text-sm dark:bg-gray-800">
        <span class="grid h-7 w-7 place-items-center rounded-full bg-rose-600 text-xs font-bold text-white">{{ p.display_name.charAt(0) }}</span>
        <span class="font-medium">{{ p.display_name }}</span>
        @if (p.is_host) { <span class="ml-auto text-xs text-gray-400">host</span> }
      </li>
    }
  </ul>

  @if (isHost()) {
    <button (click)="start()" [disabled]="busy() || state().players.length < 2"
            class="w-full rounded-xl bg-rose-600 p-3 font-semibold text-white hover:bg-rose-700 disabled:opacity-40">
      {{ state().players.length < 2 ? 'Need at least 2 players' : 'Start game' }}
    </button>
  } @else {
    <p class="rounded-lg bg-gray-100 p-3 text-center text-sm text-gray-500 dark:bg-gray-800 dark:text-gray-400">Waiting for the host to start…</p>
  }
</div>
