<div class="space-y-4" *transloco="let t">
  <div>
    <h2 class="text-lg font-bold">{{ t('lobby.title') }}</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400">{{ t('lobby.share') }}</p>
  </div>

  <ul class="space-y-1">
    @for (p of state().players; track p.id) {
      <li class="flex items-center gap-2 rounded-lg bg-gray-100 px-3 py-2 text-sm dark:bg-gray-800">
        <app-player-avatar [name]="p.display_name" [avatar]="p.avatar" [seed]="p.id" [size]="28" />
        <span class="font-medium">{{ p.display_name }}</span>
        @if (p.is_host) { <span class="ml-auto text-xs text-gray-400">{{ t('lobby.host') }}</span> }
      </li>
    }
  </ul>

  @if (isHost()) {
    <button (click)="start()" [disabled]="busy() || state().players.length < 2"
            class="w-full rounded-xl bg-rose-600 p-3 font-semibold text-white hover:bg-rose-700 disabled:opacity-40">
      {{ state().players.length < 2 ? t('lobby.needPlayers') : t('lobby.start') }}
    </button>
  } @else {
    <p class="rounded-lg bg-gray-100 p-3 text-center text-sm text-gray-500 dark:bg-gray-800 dark:text-gray-400">{{ t('lobby.waiting') }}</p>
  }

  <app-push-nudge />
</div>
