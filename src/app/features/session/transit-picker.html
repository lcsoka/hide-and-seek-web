@if (open()) {
  <div class="fixed inset-x-0 bottom-0 z-[800] flex justify-center" (click)="close()" *transloco="let t">
    <div class="max-h-[55vh] w-full max-w-lg overflow-y-auto rounded-t-3xl bg-white/95 p-4 shadow-2xl ring-1 ring-black/10 backdrop-blur dark:bg-gray-900/95 lg:mb-3 lg:rounded-3xl" (click)="$event.stopPropagation()">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-lg font-bold">{{ t('transit.boardTitle') }}</h2>
        <button (click)="close()" class="text-gray-400 hover:text-gray-600"><app-icon name="x" [size]="22" /></button>
      </div>

      <p class="mb-2 text-sm text-gray-500 dark:text-gray-400">{{ t('transit.pickLine') }}</p>

      @if (lines() === null) {
        <p class="text-sm text-gray-400">{{ t('transit.findingLines') }}</p>
      } @else if (lines()!.length) {
        <ul class="mb-3 space-y-1">
          @for (l of lines()!; track l.mode + l.ref) {
            <li>
              <button (click)="previewLine(l)"
                      class="flex w-full items-center gap-2 rounded-lg border-2 p-2 text-left text-sm transition"
                      [style.border-color]="l === selectedLine() ? mode(l.mode).color : 'transparent'"
                      [class]="l === selectedLine() ? 'bg-gray-100 dark:bg-gray-800' : 'border border-gray-200 dark:border-gray-700'">
                <app-icon [name]="mode(l.mode).icon" [size]="18" [style.color]="mode(l.mode).color" />
                <span class="grid h-6 min-w-6 place-items-center rounded px-1.5 text-xs font-bold text-white" [style.background]="l.colour || mode(l.mode).color">{{ l.ref }}</span>
                @if (l.destinations.length) {
                  <span class="min-w-0 flex-1 truncate text-xs text-gray-600 dark:text-gray-300">↔ {{ l.destinations.join(' / ') }}</span>
                } @else {
                  <span class="min-w-0 flex-1 truncate text-xs text-gray-500">{{ mode(l.mode).label }}</span>
                }
              </button>
            </li>
          }
        </ul>
        <button (click)="confirmBoard()" [disabled]="!selectedLine()"
                class="w-full rounded-xl bg-indigo-600 p-3 font-semibold text-white hover:bg-indigo-700 disabled:opacity-40">
          {{ selectedLine() ? t('transit.boardLine', { line: selectedLine()!.ref }) : t('transit.boardTitle') }}
        </button>
      } @else {
        <p class="text-sm text-gray-400">{{ t('transit.noLines') }}</p>
      }
    </div>
  </div>
}
