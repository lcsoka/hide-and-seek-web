@switch (type()) {
  @case ('candidate') {
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Lehetséges terület és kizárt terület">
      <rect x="6" y="6" width="308" height="178" rx="12" fill="#94a3b8" fill-opacity="0.16" />
      <path d="M72 46 Q150 24 236 54 Q276 96 244 138 Q160 172 84 142 Q46 96 72 46 Z" fill="#7c3aed" fill-opacity="0.20" stroke="#7c3aed" stroke-width="2.5" />
      <text x="160" y="98" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="700">lehetséges terület</text>
      <text x="160" y="170" text-anchor="middle" fill="currentColor" font-size="11" opacity="0.7">a satírozott rész már kizárva</text>
    </svg>
  }

  @case ('radar') {
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Radar kör">
      <rect x="6" y="6" width="308" height="178" rx="12" fill="#94a3b8" fill-opacity="0.14" />
      <circle cx="160" cy="98" r="66" fill="#7c3aed" fill-opacity="0.18" stroke="#2563eb" stroke-width="2.5" />
      <line x1="160" y1="98" x2="226" y2="98" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="192" y="91" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="700">X&#8202;km</text>
      <circle cx="160" cy="98" r="6" fill="#2563eb" />
      <text x="160" y="122" text-anchor="middle" fill="currentColor" font-size="10.5" opacity="0.75">kereső</text>
      <text x="160" y="56" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="700">IGEN → itt belül</text>
      <text x="160" y="180" text-anchor="middle" fill="currentColor" font-size="11" opacity="0.65">NEM → a körön kívül</text>
    </svg>
  }

  @case ('thermometer') {
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Hőmérő felezővonal">
      <rect x="6" y="6" width="308" height="178" rx="12" fill="#94a3b8" fill-opacity="0.14" />
      <!-- The warmer half (toward B) is kept -->
      <path d="M112 12 200 178 314 178 314 12 Z" fill="#7c3aed" fill-opacity="0.18" />
      <!-- Perpendicular bisector (halfway line) -->
      <line x1="112" y1="12" x2="200" y2="178" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5" />
      <!-- The seeker's walk A → B -->
      <defs><marker id="gd-arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#f59e0b" /></marker></defs>
      <line x1="86" y1="150" x2="226" y2="52" stroke="#f59e0b" stroke-width="3" marker-end="url(#gd-arrow)" />
      <circle cx="86" cy="150" r="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5" />
      <circle cx="226" cy="52" r="7" fill="#f59e0b" />
      <text x="70" y="170" text-anchor="middle" fill="currentColor" font-size="10.5" opacity="0.75">start</text>
      <text x="250" y="44" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">melegebb</text>
      <text x="250" y="150" text-anchor="middle" fill="#7c3aed" font-size="11.5" font-weight="700">ez a fél marad</text>
    </svg>
  }

  @case ('matching') {
    <!-- A real Voronoi partition (computed with turf) of 8 parks; every point belongs to its nearest
         park. The shared cell edges ARE the halfway (perpendicular-bisector) lines between parks. -->
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Voronoi cellák — minden park a hozzá legközelebbi területet birtokolja">
      <g fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-opacity="0.6">
        <path d="M4 49 L95 91 L149 4 L4 4 Z" />
        <path d="M161 4 L215 97 L316 44 L316 4 Z" />
        <path d="M215 97 L254 147 L316 128 L316 44 Z" />
        <path d="M252 186 L254 147 L215 97 L137 164 L135 186 Z" />
        <path d="M135 186 L137 164 L95 101 L4 156 L4 186 Z" />
        <path d="M4 156 L95 101 L95 91 L4 49 Z" />
        <path d="M316 128 L254 147 L252 186 L316 186 Z" />
      </g>
      <!-- the seeker's park's cell — kept ("ide eshet a bújó") -->
      <path d="M95 91 L95 101 L137 164 L215 97 L161 4 L149 4 Z" fill="#7c3aed" fill-opacity="0.22" stroke="#7c3aed" stroke-width="2.5" />
      <!-- parks (green) — the seeker's is emphasised -->
      <circle cx="150" cy="96" r="7" fill="#16a34a" stroke="#ffffff" stroke-width="2" />
      <circle cx="66" cy="44" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="246" cy="40" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="280" cy="104" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="206" cy="162" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="70" cy="150" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="40" cy="100" r="5" fill="#16a34a" fill-opacity="0.7" />
      <circle cx="300" cy="168" r="5" fill="#16a34a" fill-opacity="0.7" />
      <text x="150" y="80" text-anchor="middle" fill="currentColor" font-size="9" opacity="0.75">a te parkod</text>
      <text x="150" y="132" text-anchor="middle" fill="#7c3aed" font-size="11.5" font-weight="700">ide eshet</text>
    </svg>
  }

  @case ('tentacles') {
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Csápok a sugáron belül">
      <rect x="6" y="6" width="308" height="178" rx="12" fill="#94a3b8" fill-opacity="0.14" />
      <circle cx="160" cy="96" r="74" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 4" />
      <!-- matched cinema's cell, clipped to the radius -->
      <path d="M160 30 A66 66 0 0 1 214 128 L160 96 Z" fill="#7c3aed" fill-opacity="0.22" stroke="#7c3aed" stroke-width="2" />
      <circle cx="160" cy="96" r="5.5" fill="#0891b2" /><text x="160" y="114" text-anchor="middle" fill="currentColor" font-size="9.5" opacity="0.8">mozi</text>
      <circle cx="120" cy="60" r="5" fill="#db2777" fill-opacity="0.8" />
      <circle cx="196" cy="150" r="5" fill="#db2777" fill-opacity="0.8" />
      <circle cx="110" cy="140" r="5" fill="#db2777" fill-opacity="0.8" />
      <text x="186" y="58" text-anchor="middle" fill="#2563eb" font-size="10.5" font-weight="700">sugár</text>
      <text x="196" y="80" text-anchor="middle" fill="#7c3aed" font-size="10.5" font-weight="700">ide eshet</text>
    </svg>
  }

  @case ('measuring') {
    <svg viewBox="0 0 320 190" class="h-auto w-full" role="img" aria-label="Távolság kör a referenciahelyhez">
      <rect x="6" y="6" width="308" height="178" rx="12" fill="#94a3b8" fill-opacity="0.14" />
      <circle cx="150" cy="98" r="66" fill="#7c3aed" fill-opacity="0.18" stroke="#0891b2" stroke-width="2.5" />
      <line x1="150" y1="98" x2="216" y2="98" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="184" y="91" text-anchor="middle" fill="#0891b2" font-size="10.5" font-weight="700">a te távolságod</text>
      <path d="M150 90 l6 8 -6 8 -6 -8 Z" fill="#0891b2" />
      <text x="150" y="122" text-anchor="middle" fill="currentColor" font-size="9.5" opacity="0.8">pl. folyó</text>
      <text x="150" y="56" text-anchor="middle" fill="#7c3aed" font-size="11.5" font-weight="700">közelebb → itt belül</text>
      <text x="150" y="180" text-anchor="middle" fill="currentColor" font-size="11" opacity="0.65">távolabb → a körön kívül</text>
    </svg>
  }
}
